<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFE Imminent Warning Overlay</title>
    <style>
        /* ==================================================================
           ZDE MŮŽEŠ SNADNO MĚNIT VELIKOSTI, BARVY A PARAMETRY OBDÉLNÍKŮ:
           ================================================================== */
        :root {
            --sirka-obdelniku: 1040px;       /* Šířka obou obdélníků */
            --vyska-obdelniku: 170px;        /* Výška obou obdélníků */
            --tloustka-ohraniceni: 6px;     /* Tloušťka rámečku (např. 6px) */
            
            --barva-hlavni: #FFFF00;        /* Výchozí žlutá barva */
            --barva-pozadi: #000000;        /* Výchozí černá barva */
            
            --pismo-horni-velikost: 76px;   /* Velikost textu horního obdélníku */
            --pismo-spodni-velikost: 45px;  /* Velikost textu spodního obdélníku */
            
            --zelena-greenscreen: #00ff00;  /* Barva pozadí pro klíčování (greenscreen) */
        }
        /* ================================================================== */

        /* Nastavení zeleného pozadí */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--zelena-greenscreen);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        /* Hlavní kontejner pro oba widgety */
        .warning-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Mezera mezi obdélníky */
        }

        /* Společný základ pro oba panely */
        .panel {
            box-sizing: border-box;
            width: var(--sirka-obdelniku);
            height: var(--vyska-obdelniku);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
            transition: none; /* Okamžitá změna barev bez přechodu */
            border: var(--tloustka-ohraniceni) solid var(--barva-hlavni);
            background-color: var(--barva-pozadi);
            color: var(--barva-hlavni);
            padding: 10px;
        }

        /* Specifické nastavení velikosti písma pro každý panel */
        .primary-panel {
            font-size: var(--pismo-horni-velikost);
        }

        .secondary-panel {
            font-size: var(--pismo-spodni-velikost);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Invertovaný stav (když se barvy prohodí) */
        .panel.inverted {
            background-color: var(--barva-hlavni);
            color: var(--barva-pozadi);
            border-color: var(--barva-pozadi);
        }

        /* Pomocné ovládání na obrazovce */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .controls:hover {
            opacity: 1.0;
        }
        .controls button {
            background: var(--barva-hlavni);
            border: none;
            color: black;
            padding: 4px 8px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="warning-container">
        <!-- První obdélník: EFE IMMINENT -->
        <div id="topPanel" class="panel primary-panel">
            EFE IMMINENT
        </div>
        
        <!-- Druhý obdélník: BRACE FOR ENERGY... (nyní stejně velký a se stejným ohraničením) -->
        <div id="bottomPanel" class="panel secondary-panel">
            BRACE FOR ENERGY FLUCTUATION EVENT
        </div>
    </div>



    <script>
        const topPanel = document.getElementById('topPanel');
        const bottomPanel = document.getElementById('bottomPanel');
        const toggleBgBtn = document.getElementById('toggleBgBtn');
        let greenScreenMode = true;

        // Funkce pro prohození (invertování) barev
        function invertColors() {
            topPanel.classList.toggle('inverted');
            bottomPanel.classList.toggle('inverted');
        }

        // Interval blikání nastavený na 0.5 sekundy (500 milisekund)
        // Pokud chceš blikání zrychlit nebo zpomalit, změň číslo 500 níže
        setInterval(invertColors, 500);

        // Funkce pro změnu pozadí
        function toggleBackground() {
            if (greenScreenMode) {
                document.body.style.backgroundColor = "#111111"; // Tmavé pozadí pro testování
                greenScreenMode = false;
            } else {
                document.body.style.backgroundColor = "var(--zelena-greenscreen)"; // Greenscreen
                greenScreenMode = true;
            }
        }

        // Klikací akce
        toggleBgBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleBackground();
        });
        
        document.body.addEventListener('click', () => {
            toggleBackground();
        });
    </script>
</body>
</html>
